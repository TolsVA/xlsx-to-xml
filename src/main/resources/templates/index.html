<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XLSX → XML Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
        }

        input, button {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 100%;
        }

        button {
            cursor: pointer;
        }

        .error {
            color: #b00020;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 6px;
            display: none;
            margin-top: 10px;
        }

        .success {
            color: #0a7f2e;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<h2>Конвертер XLSX → XML</h2>

<label>Файл XLSX:</label>
<input type="file" id="fileInput" accept=".xlsx">

<button onclick="uploadFile()">Конвертировать</button>

<div id="errorBox" class="error"></div>
<div id="successBox" class="success">Файл успешно обработан</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');

        errorBox.style.display = "none";
        successBox.style.display = "none";

        if (!fileInput.files.length) {
            showError("Выберите файл");
            return;
        }

        const file = fileInput.files[0];

        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch("/api/convert", {
                method: "POST",
                body: formData
            });

            // ❌ если ошибка (400, 500 и т.д.)
            if (!response.ok) {
                let message = "Ошибка сервера";

                const contentType = response.headers.get("content-type");

                if (contentType && contentType.includes("application/json")) {
                    const json = await response.json();
                    message = json.message || JSON.stringify(json);
                } else {
                    const text = await response.text();
                    if (text && text.length < 500) {
                        message = text;
                    }
                }

                throw new Error(message);
            }

            // ✅ если всё ок — скачиваем файл
            const blob = await response.blob();

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "result.xml";
            document.body.appendChild(a);
            a.click();
            a.remove();

            window.URL.revokeObjectURL(url);

            successBox.style.display = "block";

        } catch (e) {
            showError(e.message);
        }
    }

    function showError(message) {
        const errorBox = document.getElementById('errorBox');
        errorBox.innerText = message;
        errorBox.style.display = "block";
    }
</script>

</body>
</html>
